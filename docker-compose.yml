services:
  app:
    build: .
    container_name: reports_ts
    ports:
      - "8002:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - .:/app
      - /app/__pycache__
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
